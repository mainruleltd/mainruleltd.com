<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mainrule Ltd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #0b1120, #111827);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 650px;
      padding: 40px;
    }

    .logo {
      font-size: 14px;
      letter-spacing: 2px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin: 10px 0;
      color: #ffffff;
    }

    p {
      font-size: 18px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .highlight {
      color: #38bdf8;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #38bdf8;
      margin: 25px auto;
      opacity: 0.7;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #6b7280;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(80px);
      z-index: -1;
    }

  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="container">
    <div class="logo">MAINRULE LTD</div>

    <h1>Under Construction</h1>

    <div class="divider"></div>

    <p>
      Our website is currently under development.<br>
      Coming soon with advanced solutions for the  <span class="highlight">digital generation asset management</span>.
    </p>

    <p>
      Please contact us at mainruleltd@gmail.com
    </p>

    <div class="footer">
      © Mainrule Ltd
    </div>
  </div>

</body>
</html>
